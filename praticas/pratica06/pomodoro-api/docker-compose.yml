version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: pomodoro_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pomodoro_db
    ports:
      - '3307:3306'
    volumes:
      - pomodoro_data:/var/lib/mysql

  api:
    build: .
    container_name: pomodoro_api
    restart: always
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/pomodoro_db
      PORT: 3333
    ports:
      - '3333:3333'
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pomodoro_data: